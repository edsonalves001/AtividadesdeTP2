<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Consulta de Clima</title>
    <style>
        body { font-family: Arial; background: #eef2f5; text-align: center; }
        .box { background: white; padding: 20px; margin: 40px auto; width: 40%; border-radius: 8px; }
        input { padding: 8px; margin: 5px; }
        button { padding: 10px 15px; }
    </style>
</head>
<body>
<div class="box">
    <h1>Consultar Clima</h1>
    <form action="/resultado" method="get">
        <label>Latitude:</label><br>
        <input type="text" name="latitude" required><br>

        <label>Longitude:</label><br>
        <input type="text" name="longitude" required><br><br>

        <button type="submit">Buscar</button>
    </form>
</div>
</body>
</html>
