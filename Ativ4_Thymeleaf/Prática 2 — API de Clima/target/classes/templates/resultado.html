<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Resultado do Clima</title>
    <style>
        body { font-family: Arial; background: #eef2f5; text-align: center; }
        .box { background: white; padding: 20px; margin: 40px auto; width: 50%; border-radius: 8px; }
    </style>
</head>
<body>
<div class="box">

    <div th:if="${erro}">
        <p th:text="${erro}"></p>
        <a href="/">Voltar</a>
    </div>

    <div th:if="${clima}">
        <h2>Clima Atual</h2>

        <p><b>Temperatura:</b>
            <span th:text="${clima.current.temperatura}"></span> °C</p>

        <p><b>Velocidade do vento:</b>
            <span th:text="${clima.current.veloventos}"></span> km/h</p>

        <p><b>Condição:</b>
            <span th:text="${descricao}"></span></p>

        <p><b>Horário:</b>
            <span th:text="${clima.current.tempo}"></span></p>

        <br>
        <a href="/">Nova consulta</a>
    </div>

</div>
</body>
</html>
