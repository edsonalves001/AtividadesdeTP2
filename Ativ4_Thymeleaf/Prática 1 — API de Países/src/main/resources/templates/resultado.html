<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title th:text="${nome != null ? nome.nome.nomeComum : 'País não encontrado'}">Resultado</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            background-color: white;
            width: 60%;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1, h2, h3, h4 {
            margin: 10px 0;
        }

        .label {
            font-weight: bold;
            margin-top: 15px;
        }

        img {
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #0077cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #005fa3;
        }

        .erro {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">

    <div th:if="${erro}">
        <p class="erro">Pais não encontrado</p>
        <a href="/">Voltar</a>
    </div>

    <div th:if="${nome != null}">
        <h1>Informações do País</h1>

        <div class="label">País:</div>
        <h2 th:text="${nome.nome.nomeComum}"></h2>

        <div class="label">Nome oficial:</div>
        <h3 th:text="${nome.nome.nomeOficial}"></h3>

        <div class="label">Capital(is):</div>
        <h4 th:text="${nome.capitais[0]}"></h4>

        <div class="label">Região:</div>
        <h4 th:text="${nome.regiao}"></h4>

        <div class="label">Subregião:</div>
        <h4 th:text="${nome.subregiao}"></h4>

        <div class="label">População:</div>
        <h4 th:text="${nome.populacao}"></h4>

        <div class="label">Área:</div>
        <h4 th:text="${nome.area}"></h4>

        <div class="label">Bandeira:</div>
        <img th:src="${nome.bandeira.png}" alt="Bandeira" width="200"><br>

        <a href="/">Procurar outro país</a>
    </div>

</div>

</body>
</html>
